{{define "issue_status_panel"}}
<div id="issue-status-panel" class="stack">
  <p class="issue-card__meta">Current status: {{.StatusLabel}}</p>
  {{if and .CanEdit (not .Issue.Archived)}}
  <form
    class="stack"
    method="post"
    action="/w/{{.WorkspaceSlug}}/issues/{{.Issue.IssueNumber}}/status"
    hx-patch="/w/{{.WorkspaceSlug}}/issues/{{.Issue.IssueNumber}}/status"
    hx-target="#issue-status-panel"
    hx-swap="outerHTML"
    hx-indicator="#issue-status-indicator"
    hx-disable="find button"
  >
    {{template "csrf_field" .CSRFToken}}
    <input type="hidden" name="redirect_to" value="/w/{{.WorkspaceSlug}}/projects/{{.Project.Slug}}/issues/{{.Issue.IssueNumber}}">
    <div class="form-field">
      <label class="form-field__label" for="status">Status</label>
      <select class="form-field__input" id="status" name="status">
        {{range .Statuses}}
        <option value="{{.Value}}"{{if eq $.Issue.Status .Value}} selected{{end}}>{{.Label}}</option>
        {{end}}
      </select>
    </div>
    <div class="cluster">
      <button class="button" type="submit">
        Update status
        <span id="issue-status-indicator" class="htmx-indicator" aria-hidden="true">Saving…</span>
      </button>
    </div>
  </form>
  {{end}}
</div>
{{end}}
