{{define "project_content"}}
<main class="page" id="project-content">
  <div class="page__main">
    <div class="stack">
      <h1>{{.Project.Name}}</h1>
      <p>
        Project <code>/w/{{.WorkspaceSlug}}/projects/{{.Project.Slug}}</code>
        in {{.WorkspaceName}}{{with .User}} · signed in as {{.DisplayName}}{{end}}{{with .Role}} · {{.}}{{end}}.
      </p>
      <div class="cluster">
        <a class="button button--primary" href="/w/{{.WorkspaceSlug}}/projects/{{.Project.Slug}}/issues">Issues</a>
        <a class="button" href="/w/{{.WorkspaceSlug}}/projects">All projects</a>
        <a class="button" href="/w/{{.WorkspaceSlug}}">Workspace</a>
        <a class="button" href="/app">Back to app</a>
      </div>
    </div>
  </div>
</main>
{{end}}
