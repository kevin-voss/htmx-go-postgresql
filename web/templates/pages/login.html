{{define "title"}}Log in — Forgeboard{{end}}
{{define "content"}}
<main class="page">
  <div class="page__main">
    <div class="stack" style="max-inline-size: 28rem;">
      <h1>Log in</h1>
      <p>Sign in to your Forgeboard account.</p>

      {{with .Error}}
      <p class="form-field__error" role="alert">{{.}}</p>
      {{end}}

      <form class="stack" method="post" action="/login" novalidate>
        {{template "csrf_field" .CSRFToken}}
        <div class="form-field">
          <label class="form-field__label" for="email">Email</label>
          <input
            class="form-field__input"
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            value="{{.Form.Email}}"
          >
        </div>

        <div class="form-field">
          <label class="form-field__label" for="password">Password</label>
          <input
            class="form-field__input"
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="cluster">
          <button class="button button--primary" type="submit">Log in</button>
          <a class="button" href="/register">Create account</a>
        </div>
      </form>
    </div>
  </div>
</main>
{{end}}
